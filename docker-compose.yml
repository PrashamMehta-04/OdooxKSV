services:
  postgres:
    image: postgres:16-alpine
    container_name: vendorbridge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vendorbridge
      POSTGRES_USER: vendorbridge
      POSTGRES_PASSWORD: vendorbridge
    ports:
      - "5432:5432"
    volumes:
      - vendorbridge-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vendorbridge -d vendorbridge"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  vendorbridge-postgres-data:
