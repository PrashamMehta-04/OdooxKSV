<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="primary-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#714B67" />
      <stop offset="100%" stop-color="#4d2f40" />
    </linearGradient>
    <linearGradient id="secondary-gradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00a09d" />
      <stop offset="100%" stop-color="#006c6a" />
    </linearGradient>
  </defs>
  
  <!-- Subtle Background Hexagon/Square -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#primary-gradient)" opacity="0.1" />
  
  <!-- Left Side: V (Vendor) -->
  <path d="M 120 160 L 220 380 L 280 250" fill="none" stroke="url(#primary-gradient)" stroke-width="50" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Right Side: B (Bridge) overlapping with Odoo Teal -->
  <path d="M 270 160 L 270 380" fill="none" stroke="url(#secondary-gradient)" stroke-width="40" stroke-linecap="round" />
  <path d="M 270 160 C 370 160, 400 200, 340 240 C 420 280, 400 380, 270 380" fill="none" stroke="url(#secondary-gradient)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" />
</svg>